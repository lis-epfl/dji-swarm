##############################################
#   Mosquitto Configuration for AOS Broker   #
##############################################

# --- WebSocket listener for AOS Map Visualization ---
listener 9001
protocol websockets

# --- Standard MQTT listener (default) ---
listener 1883
protocol mqtt

# --- Authentication ---
allow_anonymous true
#password_file C:\Program Files\mosquitto\password.txt

# --- Persistence Settings ---
persistence true
persistence_location C:\Program Files\mosquitto\data
persistence_file mosquitto.db

# --- Logging (optional but useful) ---
log_dest file C:\Program Files\mosquitto\mosquittolog.log
log_type error
log_type warning
log_type notice
log_type information
